repos:
  # --- commit-stage: fast checks (ruff + mypy) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        args: [linkedin_games/]
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # --- push-stage: slower checks that mirror CI exactly ---
      - id: pytest
        name: pytest
        entry: uv run --extra dev pytest
        args: [--cov=linkedin_games, --cov-report=term-missing]
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mkdocs-build
        name: mkdocs-build
        entry: uv run --extra docs mkdocs
        args: [build, --strict]
        language: system
        pass_filenames: false
        stages: [pre-commit]
